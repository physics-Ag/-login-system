<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>用户登录</title>
        <style>
            :root {
                --lc-bg: #eef1f6;
                --lc-surface: #ffffff;
                --lc-border: #dce0e8;
                --lc-border-strong: #c8ccd4;
                --lc-text: #262626;
                --lc-muted: #8c8c8c;
                --lc-btn: #292929;
                --lc-btn-hover: #171717;
                --radius-card: 12px;
                --radius-ctl: 8px;
                --font:
                    ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC",
                    "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            }

            * { box-sizing: border-box; }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: var(--font);
                background: var(--lc-bg);
                color: var(--lc-text);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 3rem 1rem 2rem;
            }

            h1 {
                font-weight: 700;
                font-size: 1.5rem;
                margin: 0 0 0.35rem;
            }

            .subtitle {
                color: var(--lc-muted);
                font-size: 0.875rem;
                margin-bottom: 1.75rem;
            }

            .panel {
                width: 100%;
                max-width: 400px;
                background: var(--lc-surface);
                border: 1px solid var(--lc-border);
                border-radius: var(--radius-card);
                padding: 0 1.35rem 1.35rem;
                padding-top: 0;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
                overflow: hidden;
            }

            #app-logged.panel { padding: 1.35rem; }

            .tabs {
                display: flex;
                margin: 0 -1.35rem 1.15rem;
                padding: 0 0.85rem;
                border-bottom: 1px solid var(--lc-border);
            }

            .tabs button {
                flex: 1;
                padding: 0.85rem 0.65rem;
                border: none;
                background: none;
                color: var(--lc-muted);
                cursor: pointer;
                font-family: inherit;
                font-size: 0.9rem;
                border-bottom: 2px solid transparent;
                margin-bottom: -1px;
            }

            .tabs button.active {
                color: var(--lc-text);
                font-weight: 600;
                border-bottom-color: var(--lc-text);
            }

            .form-block { display: none; }
            .form-block.visible { display: block; }

            label {
                display: block;
                font-size: 0.8rem;
                font-weight: 500;
                color: #525252;
                margin-bottom: 0.35rem;
            }

            input {
                width: 100%;
                padding: 0.55rem 0.7rem;
                margin-bottom: 0.9rem;
                border: 1px solid var(--lc-border-strong);
                border-radius: var(--radius-ctl);
                background: #fafbfc;
                font-family: inherit;
                font-size: 0.9375rem;
            }

            input:focus {
                outline: none;
                border-color: #6b7280;
                background: #fff;
            }

            .btn {
                width: 100%;
                padding: 0.6rem 0.75rem;
                border: 1px solid var(--lc-btn);
                border-radius: var(--radius-ctl);
                background: var(--lc-btn);
                color: #fff;
                font-family: inherit;
                font-size: 0.9375rem;
                font-weight: 600;
                cursor: pointer;
            }

            .btn:hover { background: var(--lc-btn-hover); }

            .btn.secondary {
                background: var(--lc-surface);
                color: var(--lc-text);
                border: 1px solid var(--lc-border-strong);
                margin-top: 0.6rem;
                font-weight: 500;
            }

            .msg {
                font-size: 0.8125rem;
                padding: 0.55rem 0.65rem;
                border-radius: var(--radius-ctl);
                margin: 1rem 0;
                display: none;
                border: 1px solid transparent;
            }

            .msg.show { display: block; }
            .msg.err { background: #f6f6f6; border-color: #d4d4d4; color: #383838; }
            .msg.ok { background: #f3f6f9; border-color: #cfd8e4; }

            #app-logged { display: none; }
            #app-logged.visible { display: block; }
            #app-auth.hidden { display: none; }

            .welcome {
                text-align: center;
                margin-bottom: 1rem;
                color: var(--lc-muted);
                font-size: 0.9375rem;
            }

            .welcome strong { color: var(--lc-text); font-weight: 600; }
        </style>
    </head>

    <body>
        <h1>用户登录</h1>
        <p class="subtitle">登录或注册账号</p>

        <div id="app-auth" class="panel">
            <div class="tabs">
                <button type="button" id="tab-login" class="active">登录</button>
                <button type="button" id="tab-register">注册</button>
            </div>
            <div id="flash" class="msg" role="alert"></div>

            <div id="block-login" class="form-block visible">
                <form id="form-login" autocomplete="on">
                    <label for="login-user">用户名</label>
                    <input id="login-user" name="username" type="text" required autocomplete="username">
                    <label for="login-pass">密码</label>
                    <input id="login-pass" name="password" type="password" required autocomplete="current-password">
                    <button type="submit" class="btn">登录</button>
                </form>
            </div>

            <div id="block-register" class="form-block">
                <form id="form-register" autocomplete="on">
                    <label for="reg-user">用户名</label>
                    <input id="reg-user" name="username" type="text" required autocomplete="username">
                    <label for="reg-pass">密码</label>
                    <input id="reg-pass" name="password" type="password" required autocomplete="new-password">
                    <label for="reg-pass2">再次输入密码</label>
                    <input id="reg-pass2" name="password2" type="password" required autocomplete="new-password">
                    <button type="submit" class="btn">注册</button>
                </form>
            </div>
        </div>

        <div id="app-logged" class="panel">
            <p class="welcome">已登录为 <strong id="me-name">—</strong></p>
            <button type="button" class="btn secondary" id="btn-logout">注销</button>
        </div>

        <script>
            const $ = (id) => document.getElementById(id);
            const flash = $('flash');
            let currentUser = '';

            function showFlash(text, ok) {
                flash.textContent = text;
                flash.className = 'msg show ' + (ok ? 'ok' : 'err');
            }

            function clearFlash() {
                flash.className = 'msg';
                flash.textContent = '';
            }

            function showAuth(show) {
                $('app-auth').classList.toggle('hidden', !show);
                $('app-logged').classList.toggle('visible', !show);
            }

            async function api(path, opts) {
                const r = await fetch(path, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(opts.headers || {})
                    },
                    ...opts
                });
                const text = await r.text();
                let data;
                try {
                    data = text ? JSON.parse(text) : {};
                } catch (e) {
                    throw new Error('服务器返回非 JSON');
                }
                return { ok: r.ok, status: r.status, data };
            }

            $('tab-login').onclick = () => {
                $('tab-login').classList.add('active');
                $('tab-register').classList.remove('active');
                $('block-login').classList.add('visible');
                $('block-register').classList.remove('visible');
                clearFlash();
            };

            $('tab-register').onclick = () => {
                $('tab-register').classList.add('active');
                $('tab-login').classList.remove('active');
                $('block-register').classList.add('visible');
                $('block-login').classList.remove('visible');
                clearFlash();
            };

            // 按下登录
            $('form-login').onsubmit = async (e) => {
                e.preventDefault();
                clearFlash();
                const username = $('login-user').value.trim();
                const password = $('login-pass').value;
                try {
                    const { ok, data } = await api('/api/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });
                    if (!ok) {
                        showFlash(data.error || '登录失败', false);
                        return;
                    }
                    currentUser = username;
                    $('me-name').textContent = username;
                    clearFlash();
                    showAuth(false);
                } catch (err) {
                    showFlash(err.message || '网络错误', false);
                }
            };

            // 按下注册
            $('form-register').onsubmit = async (e) => {
                e.preventDefault();
                clearFlash();
                const username = $('reg-user').value.trim();
                const password = $('reg-pass').value;
                const password2 = $('reg-pass2').value;
                if (password !== password2) {
                    showFlash('两次输入的密码不一致', false);
                    return;
                }
                try {
                    const { ok, data } = await api('/api/register', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });
                    if (!ok) {
                        showFlash(data.error || '注册失败', false);
                        return;
                    }
                    showFlash('注册成功，请登录', true);
                    $('tab-login').click();
                    $('login-user').value = username;
                    $('login-pass').value = '';
                    $('login-pass').focus();
                } catch (err) {
                    showFlash(err.message || '网络错误', false);
                }
            };

            // 按下注销
            $('btn-logout').onclick = async () => {
                if (!currentUser) {
                    showAuth(true);
                    return;
                }
                if (!confirm('确定要注销账号吗？')) {
                    return;
                }
                try {
                    const { ok, data } = await api('/api/quit', {
                        method: 'POST',
                        body: JSON.stringify({ username: currentUser })
                    });
                    if (!ok) {
                        alert(data.error || '注销失败');
                        return;
                    }
                    currentUser = '';
                    $('login-user').value = '';
                    $('login-pass').value = '';
                    showAuth(true);
                    showFlash('账号已注销', true);
                } catch (err) {
                    alert(err.message || '网络错误');
                }
            };
        </script>
    </body>
</html>
